name: Version guard

# Fails when a change touches the driver-facing app without bumping the app
# VERSION (src/lib/appVersion.ts). Keeps the "What's New" release-notes sheet
# from going stale: it only re-shows on a VERSION change, so every driver-facing
# deploy needs a bump + changelog entry. See scripts/check-version-bump.mjs.
#
# THIS WORKFLOW IS A BACKSTOP, NOT THE GATE. The blocking check is the pre-push
# hook (.githooks/pre-push, install via `npm run hooks:install`) — it runs the same
# script before the push leaves the machine, which is the only point where it can
# actually refuse. By the time this workflow runs on a push, the commit is already
# on main and Vercel has already deployed it.
#
# • On pull requests: a failure blocks the merge (if marked a required check).
# • On direct pushes to main (this repo's normal flow): a failure is only a red ✗
#   on the commit — it does NOT roll back the deploy. 29551b1 shipped titled
#   "(v2.6.0)" with no bump this way: CI caught it, CI could not stop it, and the
#   red ✗ went unread. Fix forward with a bump commit (or [skip version]).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the base..head diff is available

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check version bump on driver-facing changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # First push / unknown base → fall back to the previous commit.
            if ! git cat-file -e "$BASE^{commit}" 2>/dev/null; then
              BASE="$(git rev-parse HEAD~1 2>/dev/null || echo HEAD)"
            fi
          fi
          echo "Comparing $BASE..$HEAD"
          node scripts/check-version-bump.mjs "$BASE" "$HEAD"
